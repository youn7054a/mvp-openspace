# Railway 배포 설정 (Config-as-code) — https://docs.railway.com/reference/config-as-code
# Dockerfile 로 빌드하고, 실패 시 자동 재시작.
# 영속 볼륨(/data: SQLite + 업로드)은 대시보드에서 서비스에 연결해야 합니다.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
